ngo-service:
  replicas: 1
  namespace: ngo-service
  image: 585534523398.dkr.ecr.us-east-1.amazonaws.com/staging-ngo-service:staging
  imagePullPolicy: IfNotPresent
  port: 8081
  imagePullSecrets:
    - name: ecr-secret
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"
  probes:
    enabled: true
    path: /health
    startup:
      failureThreshold: 180
      periodSeconds: 1
    readiness:
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3
    liveness:
      initialDelaySeconds: 180
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3
  envFrom:
    - secretRef:
        name: shared-db-credentials
  env_vars: ngo_db
  ingress:
    path: /ngo-service(/|$)(.*)
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80
