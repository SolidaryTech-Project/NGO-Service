apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: app-ngo-service
    {{- include "solidarytech.labels" .| nindent 4 }}
  name: app-ngo-service
  namespace: {{ (index .Values "ngo-service").namespace }}
spec:
  strategy:
    type: Recreate
  replicas: {{ (index .Values "ngo-service").replicas}}
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: app-ngo-service
  template:
    metadata:
      labels:
        app: app-ngo-service
    spec:
      containers:
        - name: app-ngo-service
          image: {{ (index .Values "ngo-service").image }}
          imagePullPolicy: {{ (index .Values "ngo-service").imagePullPolicy }}
          env:
            - name: POSTGRES_DB
              value: {{ (index .Values "ngo-service").env_vars }}
            - name: DD_AGENT_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          startupProbe:
           httpGet:
             path: /health
             port: {{ (index .Values "ngo-service").port }}
           failureThreshold: 60
           periodSeconds: 5
           timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /health
              port: {{ (index .Values "ngo-service").port }}
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: {{ (index .Values "ngo-service").port }}
            initialDelaySeconds: 180
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          envFrom:
            {{- toYaml (index .Values "ngo-service").envFrom | nindent 12 }}
